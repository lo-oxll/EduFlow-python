<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Subjects</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>اختبار تحميل المواد</h1>
    <div id="output"></div>

    <script>
        // Simple auth headers function
        function getAuthHeaders() {
            const token = localStorage.getItem('token');
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        async function testSubjects() {
            const output = document.getElementById('output');
            output.innerHTML = '<div class="log">جاري الاختبار...</div>';
            
            try {
                // Test 1: Get current school
                output.innerHTML += '<div class="log">الخطوة 1: التحقق من المدرسة الحالية...</div>';
                const school = localStorage.getItem('school');
                if (!school) {
                    output.innerHTML += '<div class="log error">لم يتم العثور على معلومات المدرسة في localStorage</div>';
                    return;
                }
                
                const currentSchool = JSON.parse(school);
                output.innerHTML += `<div class="log success">المدرسة الحالية: ${currentSchool.name} (ID: ${currentSchool.id})</div>`;
                
                // Test 2: Fetch subjects for this school
                output.innerHTML += '<div class="log">الخطوة 2: جلب المواد من الخادم...</div>';
                const subjectsResponse = await fetch(`/api/school/${currentSchool.id}/subjects`, {
                    headers: getAuthHeaders()
                });
                
                output.innerHTML += `<div class="log">رمز الاستجابة: ${subjectsResponse.status}</div>`;
                
                if (!subjectsResponse.ok) {
                    const errorText = await subjectsResponse.text();
                    output.innerHTML += `<div class="log error">خطأ في الاستجابة: ${errorText}</div>`;
                    return;
                }
                
                const subjectsData = await subjectsResponse.json();
                output.innerHTML += `<div class="log success">تم جلب البيانات بنجاح</div>`;
                output.innerHTML += `<div class="log">المواد المتوفرة: ${subjectsData.subjects ? subjectsData.subjects.length : 0}</div>`;
                
                if (subjectsData.subjects && subjectsData.subjects.length > 0) {
                    output.innerHTML += '<div class="log success">المواد المتوفرة:</div>';
                    subjectsData.subjects.forEach(subject => {
                        output.innerHTML += `<div class="log">- ${subject.name} (${subject.grade_level}) - ID: ${subject.id}</div>`;
                    });
                } else {
                    output.innerHTML += '<div class="log error">لا توجد مواد متوفرة لهذه المدرسة</div>';
                }
                
                // Test 3: Test available subjects endpoint
                output.innerHTML += '<div class="log">الخطوة 3: اختبار نقطة نهاية المواد المتاحة...</div>';
                const availableResponse = await fetch(`/api/school/${currentSchool.id}/subjects/available`, {
                    headers: getAuthHeaders()
                });
                
                output.innerHTML += `<div class="log">رمز الاستجابة المتاحة: ${availableResponse.status}</div>`;
                
                if (!availableResponse.ok) {
                    const errorText = await availableResponse.text();
                    output.innerHTML += `<div class="log error">خطأ في الاستجابة المتاحة: ${errorText}</div>`;
                } else {
                    const availableData = await availableResponse.json();
                    output.innerHTML += `<div class="log success">المواد المتاحة: ${availableData.subjects ? availableData.subjects.length : 0}</div>`;
                    
                    if (availableData.subjects && availableData.subjects.length > 0) {
                        availableData.subjects.forEach(subject => {
                            output.innerHTML += `<div class="log">- ${subject.name} (${subject.grade_level}) - ID: ${subject.id}</div>`;
                        });
                    }
                }
                
            } catch (error) {
                output.innerHTML += `<div class="log error">خطأ: ${error.message}</div>`;
                console.error('Debug error:', error);
            }
        }
        
        // Run test when page loads
        window.addEventListener('load', testSubjects);
    </script>
</body>
</html>
